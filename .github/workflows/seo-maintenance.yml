name: SEO maintenance

# Runs the SEO maintenance scripts (see scripts/README.md) after every push
# to master — i.e. right after the daily content pipeline lands — plus a
# scheduled backstop so the /picks/ date stamps roll over even on days with
# no pushes. Pushes made by this workflow use GITHUB_TOKEN, which does not
# re-trigger push workflows, so it cannot loop.

on:
  push:
    branches: [master]
  schedule:
    - cron: "30 10 * * *" # daily 06:30 ET (05:30 EST)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: seo-maintenance
  cancel-in-progress: false

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0 # full history: sitemap lastmod comes from git log

      - name: Run maintenance scripts
        run: |
          python3 scripts/update_prospective_record.py
          python3 scripts/update_picks_freshness.py
          python3 scripts/refresh_player_cards.py
          python3 scripts/apply_analyzer_indexing.py
          python3 scripts/inject_popular_players.py
          python3 scripts/apply_site_shell.py --include-home
          python3 scripts/normalize_entity_metadata.py
          python3 scripts/normalize_analyzer_archive_language.py
          python3 scripts/normalize_coverage_claims.py
          python3 scripts/normalize_access_language.py
          python3 scripts/set_archive_indexing.py
          python3 scripts/sync_faq_schema.py
          python3 scripts/refresh_performance_snapshot.py
          python3 scripts/generate_sitemap.py

      - name: Verify generated site contracts
        run: |
          python3 scripts/check_site_consistency.py
          python3 scripts/apply_site_shell.py --check --include-home
          python3 scripts/normalize_entity_metadata.py --check
          python3 scripts/normalize_analyzer_archive_language.py --check
          python3 scripts/normalize_coverage_claims.py --check
          python3 scripts/normalize_access_language.py --check
          python3 scripts/set_archive_indexing.py --check
          python3 scripts/sync_faq_schema.py --check
          python3 scripts/check_schema_parity.py
          python3 scripts/check_ai_search_assets.py
          python3 -m unittest scripts/test_ai_search_assets.py
          python3 scripts/generate_sitemap.py --check

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "seo-maintenance"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: refresh content, archive evidence, and sitemap"
          # The content pipeline may push while we run; rebase then push.
          git pull --rebase origin master
          git push origin master
