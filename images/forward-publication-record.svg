<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="t d"><title id="t">Propeller forward publication record</title><desc id="d">A day-one research ledger emphasizing immutable captures and precise limitations.</desc><rect width="1200" height="630" fill="#101311"/><g font-family="Arial,sans-serif"><text x="70" y="86" fill="#f6dd68" font-size="22" font-weight="700">FORWARD PUBLICATION RECORD / SINCE JULY 14, 2026</text><text x="70" y="210" fill="#fff" font-size="82" font-weight="700">Start the clock.</text><text x="70" y="296" fill="#6f94ff" font-size="82" font-weight="700">Show every row.</text><rect x="70" y="365" width="1060" height="130" fill="#f2efe8"/><g fill="#101311" font-size="19"><text x="98" y="410" font-weight="700">IMMUTABLE CAPTURE</text><text x="98" y="450">player · market · line · direction · score · capture time</text><text x="760" y="410" font-weight="700">PRECISE LIMIT</text><text x="760" y="450">event-start ordering not verified</text></g><text x="70" y="565" fill="#b9c0b9" font-size="18">No historical backfill. No ROI claim. Machine-readable JSON available.</text></g></svg>
