<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opening Propeller Picks</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0AE2A3">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path d='M16 2L28 16L16 30L4 16Z' fill='%230AE2A3'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: dark;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    background:
      radial-gradient(circle at top, rgba(10, 226, 163, 0.18), transparent 40%),
      linear-gradient(180deg, #05070c 0%, #090d15 55%, #05070c 100%);
    color: #e8ecf3;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 440px;
    background: rgba(17, 20, 28, 0.92);
    border: 1px solid rgba(10, 226, 163, 0.22);
    border-radius: 28px;
    padding: 40px 28px 32px;
    box-shadow: 0 28px 90px rgba(0, 0, 0, 0.55);
    text-align: center;
  }
  .badge {
    width: 72px;
    height: 72px;
    margin: 0 auto 24px;
    border-radius: 24px;
    border: 1px solid rgba(10, 226, 163, 0.3);
    background: rgba(10, 226, 163, 0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 40px rgba(10, 226, 163, 0.18);
  }
  .badge svg { width: 38px; height: 38px; fill: #0AE2A3; }
  .kicker {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: #0AE2A3;
    margin: 0 0 12px;
  }
  h1 {
    font-size: 30px;
    font-weight: 800;
    margin: 0 0 14px;
    letter-spacing: -0.02em;
  }
  p { color: #a8b0bf; font-size: 15px; line-height: 1.55; margin: 0 0 20px; }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 16px 24px;
    border-radius: 16px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.01em;
    text-decoration: none;
    transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.2s ease;
    border: none;
    cursor: pointer;
  }
  .btn-primary {
    background: #0AE2A3;
    color: #000;
    box-shadow: 0 12px 30px rgba(10, 226, 163, 0.35);
  }
  .btn-primary:active { transform: translateY(1px); }
  .btn-primary[disabled] {
    opacity: 0.5;
    cursor: not-allowed;
    box-shadow: none;
  }
  .btn-secondary {
    background: transparent;
    color: #a8b0bf;
    border: 1px solid rgba(168, 176, 191, 0.2);
    margin-top: 12px;
  }
  .state {
    min-height: 24px;
    margin-top: 16px;
    font-size: 13px;
    color: #7c8496;
  }
  .error {
    color: #ff8080;
  }
  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(0, 0, 0, 0.25);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .support {
    margin-top: 24px;
    font-size: 12px;
    color: #5a6173;
  }
  .support a { color: #0AE2A3; text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="badge" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M12 2L22 12L12 22L2 12Z"/></svg>
    </div>
    <p class="kicker">Mobile Setup</p>
    <h1 id="title">Your trial is live.</h1>
    <p id="subtitle">One tap to jump back into Propeller Picks on your phone.</p>

    <a id="open-btn" class="btn btn-primary" href="#" aria-disabled="true">
      <span id="btn-spinner" class="spinner" aria-hidden="true"></span>
      <span id="btn-label">Preparing your session…</span>
    </a>
    <a class="btn btn-secondary" href="https://apps.apple.com/app/id6760788202" target="_blank" rel="noopener">
      Install from App Store
    </a>

    <div id="state" class="state" role="status"></div>

    <p class="support">
      Need help? <a href="mailto:hi@propellerpicks.com">hi@propellerpicks.com</a>
    </p>
  </div>
</div>

<script>
  (function () {
    var API_BASE = 'https://web-production-3c1c4.up.railway.app';
    var CALLBACK_BASE = 'https://app.propellerpicks.com/auth/callback';

    var params = new URLSearchParams(window.location.search);
    var sessionId = params.get('session_id');

    var btn = document.getElementById('open-btn');
    var btnLabel = document.getElementById('btn-label');
    var btnSpinner = document.getElementById('btn-spinner');
    var stateEl = document.getElementById('state');
    var subtitleEl = document.getElementById('subtitle');

    function setReady(deepLink) {
      btn.href = deepLink;
      btn.setAttribute('aria-disabled', 'false');
      btn.removeAttribute('disabled');
      btnSpinner.style.display = 'none';
      btnLabel.textContent = 'Open Propeller Picks';
      stateEl.textContent = 'Tap the button above to return to the app.';
      stateEl.className = 'state';
    }

    function setError(msg) {
      btnSpinner.style.display = 'none';
      btnLabel.textContent = 'Retry';
      btn.href = window.location.href;
      stateEl.textContent = msg;
      stateEl.className = 'state error';
    }

    if (!sessionId || !sessionId.indexOf || sessionId.indexOf('cs_') !== 0) {
      setError('Missing or invalid checkout session. Contact support if this persists.');
      return;
    }

    fetch(API_BASE + '/api/auth/exchange-stripe-session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId }),
    })
      .then(function (res) {
        if (!res.ok) {
          return res.json().then(function (j) {
            throw new Error((j && j.detail) || ('HTTP ' + res.status));
          });
        }
        return res.json();
      })
      .then(function (tokens) {
        if (!tokens || !tokens.access_token || !tokens.refresh_token) {
          throw new Error('Token response was missing fields');
        }
        var q = new URLSearchParams({
          access_token: tokens.access_token,
          refresh_token: tokens.refresh_token,
          token_type: tokens.token_type || 'bearer',
        });
        setReady(CALLBACK_BASE + '?' + q.toString());
      })
      .catch(function (err) {
        console.error('[mobile-return] exchange failed', err);
        setError('Could not complete handoff: ' + (err.message || 'unknown error'));
      });
  })();
</script>
</body>
</html>
